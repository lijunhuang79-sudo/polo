# 证书路径以 certbot 默认为准。Basic Auth 与汇报文档一致：/etc/nginx/.plc-sim-auth，用户 admin

# 80 端口：统一入口，强制跳转 HTTPS（与《部署总结汇报》Slide 6 一致）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name plc-sim.com www.plc-sim.com api.plc-sim.com;
    return 301 https://$host$request_uri;
}

# plc-sim.com → 跳转到 www（HTTPS）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name plc-sim.com;

    ssl_certificate     /etc/letsencrypt/live/plc-sim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plc-sim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.plc-sim.com$request_uri;
}

# 前端 www.plc-sim.com（带调试密码）- 使用 Polo 仓库部署目录
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.plc-sim.com;
    root /var/www/plc-sim/polo/frontend;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/plc-sim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plc-sim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/plc-sim-frontend.access.log;
    error_log  /var/log/nginx/plc-sim-frontend.error.log;
}

# API api.plc-sim.com（带调试密码）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.plc-sim.com;

    ssl_certificate     /etc/letsencrypt/live/plc-sim.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plc-sim.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log /var/log/nginx/plc-sim-api.access.log;
    error_log  /var/log/nginx/plc-sim-api.error.log;
}

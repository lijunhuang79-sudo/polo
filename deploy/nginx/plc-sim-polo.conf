# PLC-Sim 站点 Nginx 配置（Polo 仓库部署用）
# 与 plc-sim.conf 相同，仅 root 改为 GitHub 同步目录：/var/www/plc-sim/polo/frontend
# 服务器 IP: 213.111.157.18
# 仓库: https://github.com/lijunhuang79-sudo/polo
#
# 启用方式（二选一）：
#   A. 用本文件替换 sites-available 中的 plc-sim.conf
#   B. 或只改原 plc-sim.conf 里 www 的 root 为：root /var/www/plc-sim/polo/frontend;

server {
    listen 80;
    listen [::]:80;
    server_name plc-sim.com;
    return 301 http://www.plc-sim.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.plc-sim.com;
    root /var/www/plc-sim/polo/frontend;
    index index.html;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/plc-sim-frontend.access.log;
    error_log  /var/log/nginx/plc-sim-frontend.error.log;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.plc-sim.com;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log /var/log/nginx/plc-sim-api.access.log;
    error_log  /var/log/nginx/plc-sim-api.error.log;
}

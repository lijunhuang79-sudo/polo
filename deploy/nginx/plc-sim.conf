# PLC-Sim 站点 Nginx 配置
# 服务器 IP: 213.111.157.18
# 域名: plc-sim.com, www.plc-sim.com, api.plc-sim.com
#
# 调试访问密码：在服务器上执行以下命令生成密码文件（首次或修改密码时）
#   sudo apt install -y apache2-utils   # 如未安装
#   sudo htpasswd -c /etc/nginx/.plc-sim-auth admin
#   按提示输入调试密码。若已存在文件要追加用户，去掉 -c：sudo htpasswd /etc/nginx/.plc-sim-auth admin
# 对外开放时：注释掉各 server 中的 auth_basic、auth_basic_user_file 三行，并重载 nginx 即可。

# 将 plc-sim.com 统一跳转到 www（先用 HTTP，配置 SSL 后改为 https）
server {
    listen 80;
    listen [::]:80;
    server_name plc-sim.com;
    return 301 http://www.plc-sim.com$request_uri;
}

# 前端 SPA：www.plc-sim.com（带调试密码，暂不对外开放）
server {
    listen 80;
    listen [::]:80;
    server_name www.plc-sim.com;
    root /var/www/plc-sim/polo/frontend;
    index index.html;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 前端请求走同域 /api，浏览器会带同一密码，无需再输
    location /api/ {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/plc-sim-frontend.access.log;
    error_log  /var/log/nginx/plc-sim-frontend.error.log;
}

# API 子域：api.plc-sim.com（同样需要调试密码，便于 curl 等直接调接口）
server {
    listen 80;
    listen [::]:80;
    server_name api.plc-sim.com;

    auth_basic "调试访问 (Debug Access)";
    auth_basic_user_file /etc/nginx/.plc-sim-auth;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        auth_basic "调试访问 (Debug Access)";
        auth_basic_user_file /etc/nginx/.plc-sim-auth;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log /var/log/nginx/plc-sim-api.access.log;
    error_log  /var/log/nginx/plc-sim-api.error.log;
}

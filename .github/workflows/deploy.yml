# 推送到 main 后自动部署到 plc-sim.com（也可在 Actions 页手动 Run workflow）
# 仓库: https://github.com/lijunhuang79-sudo/polo
#
# 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置：
#   DEPLOY_SSH_KEY   — 服务器 SSH 私钥全文（必填）
#   SSH_HOST         — 主机，如 plc-sim.com 或 213.111.157.18（必填）
#   SSH_USERNAME     — SSH 用户名，如 root（必填）
#   SSH_PORT         — SSH 端口，不填则默认 22（可选）

name: Deploy via SSH (plc-sim.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查部署用 Secret 是否已配置
        run: |
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "::error::SSH_HOST 未配置。请到 Settings → Secrets and variables → Actions 添加 SSH_HOST（如 plc-sim.com 或服务器 IP）"; exit 1; fi
          if [ -z "${{ secrets.SSH_USERNAME }}" ]; then echo "::error::SSH_USERNAME 未配置。请添加 SSH_USERNAME（如 root）"; exit 1; fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then echo "::error::DEPLOY_SSH_KEY 未配置。请添加服务器 SSH 私钥全文"; exit 1; fi
          echo "Secrets 已配置，继续 SSH 部署..."

      - name: SSH 到服务器并执行部署
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            whoami
            hostname
            echo "SSH 连接成功 — 开始部署"
            export REPO_URL="https://github.com/lijunhuang79-sudo/polo.git"
            export REPO_BRANCH="main"
            export REPO_ROOT="/var/www/plc-sim/polo"
            export FRONTEND_WWW="/var/www/plc-sim/polo/frontend"
            export PM2_APP_NAME="plc-sim-api"
            if [ ! -d "$REPO_ROOT/.git" ]; then
              git clone -b "$REPO_BRANCH" "$REPO_URL" "$REPO_ROOT"
            fi
            cd "$REPO_ROOT"
            git fetch origin "$REPO_BRANCH"
            git reset --hard "origin/$REPO_BRANCH"
            [ -f .env.production ] || cp -n env.production.example .env.production 2>/dev/null || true
            npm ci
            npm run build
            mkdir -p "$FRONTEND_WWW"
            rsync -a --delete dist/ "$FRONTEND_WWW/"
            if [ -d backend ] && [ -f backend/server.js ]; then
              cd "$REPO_ROOT/backend"
              if command -v pm2 >/dev/null 2>&1; then
                pm2 restart plc-sim-api --update-env || pm2 start server.js --name plc-sim-api
                pm2 save
              fi
            fi
            echo "Deploy done."
